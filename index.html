<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QR Forge ×10 — Batch QR Code Generator</title>
<meta name="description" content="Generate up to 10 QR codes instantly. Free, open source."/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Archivo+Black&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;
  --border:#2a2a2a;--text:#f0f0f0;--muted:#555;
  --accent:#00ff88;--accent2:#00ccff;--radius:12px;
}
body{
  font-family:'Space Mono',monospace;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  padding:32px 16px;position:relative;overflow-x:hidden;
}
body::before{
  content:"";position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,255,136,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;
}
.wrap{position:relative;z-index:1;width:100%;max-width:680px;display:flex;flex-direction:column;gap:20px;}
.header{text-align:center;padding:8px 0 4px;}
.title{
  font-family:'Archivo Black',sans-serif;
  font-size:clamp(2rem,7vw,3rem);letter-spacing:-1px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;
}
.sub{font-size:0.62rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:8px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:14px;}
.lbl{font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.inputs-grid{display:flex;flex-direction:column;gap:6px;}
.input-row{display:flex;align-items:center;gap:8px;}
.row-num{font-size:0.65rem;color:var(--muted);min-width:20px;text-align:right;flex-shrink:0;}
.inp{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:10px 13px;color:var(--text);font-family:'Space Mono',monospace;
  font-size:0.82rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;width:100%;
}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,255,136,0.1);}
.inp::placeholder{color:var(--muted);}
.options-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.field{display:flex;flex-direction:column;gap:5px;}
.color-wrap{
  display:flex;align-items:center;gap:9px;
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:8px 11px;cursor:pointer;transition:border-color 0.2s;
}
.color-wrap:hover{border-color:var(--accent);}
.swatch{width:24px;height:24px;border-radius:5px;border:1.5px solid rgba(255,255,255,0.12);flex-shrink:0;transition:transform 0.2s;}
.color-wrap:hover .swatch{transform:scale(1.1);}
input[type="color"]{position:absolute;opacity:0;width:0;height:0;pointer-events:none;}
.hex-val{font-size:0.7rem;color:var(--muted);letter-spacing:1px;}
.sel{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:10px 30px 10px 11px;color:var(--text);font-family:'Space Mono',monospace;
  font-size:0.75rem;outline:none;cursor:pointer;appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%23555' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 8px center;background-size:14px;
  transition:border-color 0.2s;
}
.sel:focus{border-color:var(--accent);}
.size-field{display:flex;flex-direction:column;gap:5px;}
.size-row{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 11px;}
input[type="range"]{flex:1;-webkit-appearance:none;height:3px;background:var(--border);border-radius:99px;outline:none;cursor:pointer;min-width:80px;}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;transition:transform 0.2s;}
input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.3);}
.size-num{font-size:0.7rem;color:var(--accent);font-weight:700;min-width:34px;text-align:right;}
.gen-btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;border:none;border-radius:8px;padding:14px;
  font-family:'Archivo Black',sans-serif;font-size:0.92rem;letter-spacing:1px;
  cursor:pointer;text-transform:uppercase;transition:transform 0.2s,box-shadow 0.2s,opacity 0.2s;
}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,255,136,0.3);}
.gen-btn:active{transform:translateY(0);}
.gen-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}
.results{display:none;flex-direction:column;gap:14px;}
.results.show{display:flex;}
.results-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.results-title{font-size:0.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--accent);}
.dl-all-btn{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:8px 14px;color:var(--text);font-family:'Space Mono',monospace;
  font-size:0.65rem;cursor:pointer;transition:border-color 0.2s,color 0.2s;
}
.dl-all-btn:hover{border-color:var(--accent);color:var(--accent);}
.dl-all-btn:disabled{opacity:0.5;cursor:not-allowed;}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;}
.qr-item{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:14px;display:flex;flex-direction:column;align-items:center;gap:9px;
  animation:fadeUp 0.35s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.qr-item canvas{border-radius:7px;max-width:100%;height:auto;image-rendering:pixelated;display:block;}
.qr-num{font-size:0.58rem;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
.qr-label{font-size:0.62rem;color:var(--muted);text-align:center;word-break:break-all;line-height:1.6;max-width:170px;}
.qr-dl{
  background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  padding:7px 10px;color:var(--text);font-family:'Space Mono',monospace;
  font-size:0.62rem;cursor:pointer;transition:border-color 0.2s,color 0.2s;width:100%;
}
.qr-dl:hover{border-color:var(--accent);color:var(--accent);}
.empty-hint{text-align:center;padding:20px 0 4px;color:var(--muted);font-size:0.72rem;line-height:2;}
.footer{text-align:center;font-size:0.6rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;opacity:0.4;}
.footer a{color:var(--muted);text-decoration:none;}
.footer a:hover{color:var(--accent);}
@media(max-width:480px){
  .options-row{flex-direction:column;}
  .qr-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="title">QR FORGE ×10</div>
    <div class="sub">batch qr code generator — up to 10 at once</div>
  </div>

  <div class="card">
    <div>
      <div class="lbl">Enter up to 10 links / texts (one per row)</div>
      <div class="inputs-grid" id="inputsGrid"></div>
    </div>

    <div class="options-row">
      <div class="field">
        <div class="lbl">QR Color</div>
        <div class="color-wrap" id="fgWrap">
          <div class="swatch" id="fgSwatch"></div>
          <span class="hex-val" id="fgHex">#00FF88</span>
          <input type="color" id="fgPicker" value="#00ff88"/>
        </div>
      </div>
      <div class="field">
        <div class="lbl">Background</div>
        <div class="color-wrap" id="bgWrap">
          <div class="swatch" id="bgSwatch"></div>
          <span class="hex-val" id="bgHex">#0A0A0A</span>
          <input type="color" id="bgPicker" value="#0a0a0a"/>
        </div>
      </div>
      <div class="field">
        <div class="lbl">Error Correction</div>
        <select class="sel" id="ecLevel">
          <option value="L">L — 7%</option>
          <option value="M" selected>M — 15%</option>
          <option value="Q">Q — 25%</option>
          <option value="H">H — 30%</option>
        </select>
      </div>
      <div class="size-field">
        <div class="lbl">Size — <span id="sizeDisp">220</span>px</div>
        <div class="size-row">
          <input type="range" id="sizeSlider" min="120" max="500" value="220" step="10"/>
          <span class="size-num" id="sizeNum">220</span>
        </div>
      </div>
    </div>

    <button class="gen-btn" id="genBtn">⬡ Generate All QR Codes</button>
  </div>

  <div class="results" id="results">
    <div class="results-header">
      <div class="results-title" id="resultsTitle">▸ your qr codes</div>
      <button class="dl-all-btn" id="dlAllBtn">⬇ Download All as ZIP</button>
    </div>
    <div class="qr-grid" id="qrGrid"></div>
  </div>

  <div class="empty-hint" id="emptyHint">Fill in at least one field above and tap Generate</div>

  <div class="footer">qr forge ×10 &nbsp;·&nbsp; open source &nbsp;·&nbsp; <a href="https://github.com" target="_blank" rel="noopener">github</a></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
"use strict";

/* ── Build 10 input rows ── */
const N = 10;
const inputsGrid = document.getElementById("inputsGrid");
for (let i = 0; i < N; i++) {
  const row = document.createElement("div");
  row.className = "input-row";
  row.innerHTML = `
    <span class="row-num">${i + 1}</span>
    <input class="inp qr-inp" type="text"
      placeholder="${i === 0 ? "e.g. https://example.com, John Doe, Wi-Fi…" : "optional"}"
      autocomplete="off" spellcheck="false"/>`;
  inputsGrid.appendChild(row);
}

/* ── Element refs ── */
const fgPicker   = document.getElementById("fgPicker");
const bgPicker   = document.getElementById("bgPicker");
const fgSwatch   = document.getElementById("fgSwatch");
const bgSwatch   = document.getElementById("bgSwatch");
const fgHex      = document.getElementById("fgHex");
const bgHex      = document.getElementById("bgHex");
const fgWrap     = document.getElementById("fgWrap");
const bgWrap     = document.getElementById("bgWrap");
const ecLevel    = document.getElementById("ecLevel");
const sizeSlider = document.getElementById("sizeSlider");
const sizeDisp   = document.getElementById("sizeDisp");
const sizeNum    = document.getElementById("sizeNum");
const genBtn     = document.getElementById("genBtn");
const results    = document.getElementById("results");
const qrGrid     = document.getElementById("qrGrid");
const resultsTitle = document.getElementById("resultsTitle");
const dlAllBtn   = document.getElementById("dlAllBtn");
const emptyHint  = document.getElementById("emptyHint");

let generatedCanvases = [];

/* ── Color pickers ── */
function syncColor(w) {
  const p = w === "fg" ? fgPicker : bgPicker;
  const s = w === "fg" ? fgSwatch : bgSwatch;
  const h = w === "fg" ? fgHex    : bgHex;
  s.style.background = p.value;
  h.textContent = p.value.toUpperCase();
}
syncColor("fg"); syncColor("bg");
fgWrap.addEventListener("click", () => fgPicker.click());
bgWrap.addEventListener("click", () => bgPicker.click());
fgPicker.addEventListener("input", () => syncColor("fg"));
bgPicker.addEventListener("input", () => syncColor("bg"));

/* ── Size slider ── */
sizeSlider.addEventListener("input", () => {
  sizeDisp.textContent = sizeSlider.value;
  sizeNum.textContent  = sizeSlider.value;
});

/* ── Enter key on any input triggers generate ── */
document.addEventListener("keydown", e => {
  if (e.key === "Enter") generateAll();
});

/* ── Render one QR code to a canvas ── */
function renderQRToCanvas(text, size, fg, bg, ec) {
  return new Promise((resolve, reject) => {
    const tmp = document.createElement("div");
    tmp.style.cssText = "position:fixed;left:-9999px;top:0;visibility:hidden;";
    document.body.appendChild(tmp);
    try {
      new QRCode(tmp, {
        text, width: size, height: size,
        colorDark: fg, colorLight: bg,
        correctLevel: QRCode.CorrectLevel[ec]
      });
    } catch(e) {
      document.body.removeChild(tmp);
      reject(e); return;
    }
    const gen = tmp.querySelector("canvas") || tmp.querySelector("img");
    if (!gen) { document.body.removeChild(tmp); reject(new Error("No output")); return; }
    const canvas = document.createElement("canvas");
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext("2d");
    const draw = () => {
      ctx.clearRect(0, 0, size, size);
      ctx.drawImage(gen, 0, 0, size, size);
      document.body.removeChild(tmp);
      resolve(canvas);
    };
    if (gen.tagName === "CANVAS" || gen.complete) draw();
    else { gen.onload = draw; gen.onerror = () => { document.body.removeChild(tmp); reject(new Error("Load failed")); }; }
  });
}

/* ── Generate all ── */
genBtn.addEventListener("click", generateAll);

async function generateAll() {
  const inputs = [...document.querySelectorAll(".qr-inp")];
  const texts  = inputs.map(i => i.value.trim()).filter(Boolean);

  if (texts.length === 0) {
    inputs[0].style.borderColor = "#ff6b35";
    inputs[0].focus();
    setTimeout(() => { inputs[0].style.borderColor = ""; }, 600);
    return;
  }

  const size = parseInt(sizeSlider.value);
  const fg   = fgPicker.value;
  const bg   = bgPicker.value;
  const ec   = ecLevel.value;

  genBtn.disabled = true;
  genBtn.textContent = `⟳ Generating ${texts.length} QR code${texts.length > 1 ? "s" : ""}…`;
  qrGrid.innerHTML = "";
  generatedCanvases = [];
  results.classList.remove("show");

  try {
    for (let i = 0; i < texts.length; i++) {
      const canvas = await renderQRToCanvas(texts[i], size, fg, bg, ec);
      generatedCanvases.push({ canvas, text: texts[i] });

      /* Build card */
      const item  = document.createElement("div");  item.className  = "qr-item";
      const num   = document.createElement("div");  num.className   = "qr-num";   num.textContent = `#${i + 1}`;
      const lbl   = document.createElement("div");  lbl.className   = "qr-label";
      lbl.textContent = texts[i].length > 42 ? texts[i].slice(0, 42) + "…" : texts[i];
      const dlBtn = document.createElement("button"); dlBtn.className = "qr-dl"; dlBtn.textContent = "⬇ Download PNG";

      const idx = i;
      dlBtn.addEventListener("click", () => {
        const a = document.createElement("a");
        a.download = `qr-${idx + 1}-${fn(texts[idx])}.png`;
        a.href = generatedCanvases[idx].canvas.toDataURL("image/png");
        a.click();
      });

      item.appendChild(num);
      item.appendChild(canvas);
      item.appendChild(lbl);
      item.appendChild(dlBtn);
      qrGrid.appendChild(item);
    }

    resultsTitle.textContent = `▸ ${texts.length} qr code${texts.length > 1 ? "s" : ""} generated`;
    emptyHint.style.display  = "none";
    results.classList.add("show");
    setTimeout(() => results.scrollIntoView({ behavior: "smooth", block: "nearest" }), 100);

  } catch(err) {
    console.error(err);
    alert("Failed to generate one or more QR codes. Try shorter text or lower error correction.");
  }

  genBtn.disabled    = false;
  genBtn.textContent = "⬡ Generate All QR Codes";
}

/* ── Download all as ZIP ── */
dlAllBtn.addEventListener("click", async () => {
  if (!generatedCanvases.length) return;
  dlAllBtn.textContent = "⟳ Zipping…";
  dlAllBtn.disabled    = true;
  try {
    const zip = new JSZip();
    for (let i = 0; i < generatedCanvases.length; i++) {
      const { canvas, text } = generatedCanvases[i];
      const base64 = canvas.toDataURL("image/png").split(",")[1];
      zip.file(`qr-${i + 1}-${fn(text)}.png`, base64, { base64: true });
    }
    const blob = await zip.generateAsync({ type: "blob" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = "qr-codes.zip"; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  } catch(e) {
    alert("ZIP download failed. Try downloading individually.");
  }
  dlAllBtn.textContent = "⬇ Download All as ZIP";
  dlAllBtn.disabled    = false;
});

/* ── Helpers ── */
function fn(str) {
  return (str || "qr").replace(/[^a-zA-Z0-9_-]/g, "_").slice(0, 30);
}
</script>
</body>
</html>
